<div class="app-layout">
  
  <!-- Sidebar Navigation -->
  <aside class="sidebar" *ngIf="router.url !== '/login' && router.url !== '/register'">
    <div class="logo">
      <div class="logo-icon"></div>
      <h2>REMS</h2>
    </div>

    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span>Dashboard</span>
      </a>

      <div class="nav-section">Properties</div>
      <a routerLink="/properties" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>All Properties</span>
      </a>
      <a routerLink="/properties/new" routerLinkActive="active" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>Add Property</span>
      </a>

      <div class="nav-section">Clients</div>
      <a routerLink="/buyers" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        <span>Buyers</span>
      </a>
      <a routerLink="/agents" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4 0-7 2-7 4v2h14v-2c0-2-3-4-7-4z"></path></svg>
        <span>Agents</span>
      </a>
      <a routerLink="/appointments" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M8 7h8"></path><path d="M12 11v6"></path><rect x="3" y="3" width="18" height="18" rx="2"></rect></svg>
        <span>Appointments</span>
      </a>
      <a routerLink="/transactions" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 4h14"></path><path d="M5 20h14"></path><path d="M7 12h10"></path><rect x="4" y="6" width="16" height="12" rx="2"></rect></svg>
        <span>Transactions</span>
      </a>
      <a routerLink="/sellers" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Sellers</span>
      </a>
      <div class="nav-section">Account</div>
      <a routerLink="/login" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8"></path><polyline points="10 17 15 12 10 7"></polyline></svg>
        <span>Login</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
