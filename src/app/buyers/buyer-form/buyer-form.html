<div class="form-container">
  <div class="form-header">
    <h2>Register New Buyer</h2>
    <p>Add a prospective client to your CRM directory.</p>
  </div>

  <form [formGroup]="buyerForm" (ngSubmit)="onSubmit()" class="glass-form">
    
    <div class="form-section">
      <h3>Personal Information</h3>
      
      <div class="form-row split-2">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" formControlName="firstName" placeholder="e.g. Michael">
          <span class="error" *ngIf="buyerForm.get('firstName')?.touched && buyerForm.get('firstName')?.invalid">
            Please enter a valid first name.
          </span>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" formControlName="lastName" placeholder="e.g. Chen">
          <span class="error" *ngIf="buyerForm.get('lastName')?.touched && buyerForm.get('lastName')?.invalid">
            Please enter a valid last name.
          </span>
        </div>
      </div>

      <div class="form-row split-2">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-with-icon">
            <svg class="icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            <input type="email" id="email" formControlName="email" placeholder="michael@example.com">
          </div>
          <span class="error" *ngIf="buyerForm.get('email')?.touched && buyerForm.get('email')?.invalid">
            Please enter a valid email address.
          </span>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="input-with-icon">
            <svg class="icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            <input type="tel" id="phone" formControlName="phone" placeholder="+1 (555) 000-0000">
          </div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Buying Preferences</h3>
      
      <div class="form-row split-3">
        <div class="form-group">
          <label for="budget">Target Budget (USD)</label>
          <div class="input-with-icon">
            <span class="icon">$</span>
            <input type="number" id="budget" formControlName="budget" placeholder="0">
          </div>
        </div>

        <div class="form-group">
          <label for="interestedIn">Interested In</label>
          <div class="select-wrapper">
            <select id="interestedIn" formControlName="interestedIn">
              <option value="Modern Villas">Modern Villas</option>
              <option value="Downtown Apartments">Downtown Apartments</option>
              <option value="Luxury Estates">Luxury Estates</option>
              <option value="Suburban Homes">Suburban Homes</option>
              <option value="Commercial Properties">Commercial Properties</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="status">Client Status</label>
          <div class="select-wrapper">
            <select id="status" formControlName="status">
              <option value="Active">Active</option>
              <option value="Pending">Pending</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label for="notes">Additional Notes</label>
          <textarea id="notes" formControlName="notes" rows="4" placeholder="Enter any specific requirements, preferred neighborhoods, etc."></textarea>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Register Buyer</span>
        <span *ngIf="isSubmitting" class="loader"></span>
      </button>
    </div>

  </form>
</div>
