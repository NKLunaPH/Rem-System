<div class="form-page">
  <div class="page-header">
    <div>
      <h1>New Appointment</h1>
      <p>Schedule a client appointment with your team and property details.</p>
    </div>
  </div>

  <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()" class="appointment-form">
    <div class="form-grid">
      <label>
        Buyer
        <select formControlName="buyer">
          <option value="" disabled>Select buyer</option>
          <option *ngFor="let buyer of buyers" [value]="buyer">{{ buyer }}</option>
        </select>
        <span class="error" *ngIf="appointmentForm.get('buyer')?.touched && appointmentForm.get('buyer')?.invalid">Buyer is required.</span>
      </label>

      <label>
        Agent
        <select formControlName="agent">
          <option value="" disabled>Select agent</option>
          <option *ngFor="let agent of agents" [value]="agent">{{ agent }}</option>
        </select>
        <span class="error" *ngIf="appointmentForm.get('agent')?.touched && appointmentForm.get('agent')?.invalid">Agent is required.</span>
      </label>

      <label>
        Property
        <select formControlName="property">
          <option value="" disabled>Select property</option>
          <option *ngFor="let property of properties" [value]="property">{{ property }}</option>
        </select>
        <span class="error" *ngIf="appointmentForm.get('property')?.touched && appointmentForm.get('property')?.invalid">Property is required.</span>
      </label>

      <label>
        Date
        <input type="date" formControlName="date" />
        <span class="error" *ngIf="appointmentForm.get('date')?.touched && appointmentForm.get('date')?.invalid">Date is required.</span>
      </label>

      <label>
        Time
        <input type="time" formControlName="time" />
        <span class="error" *ngIf="appointmentForm.get('time')?.touched && appointmentForm.get('time')?.invalid">Time is required.</span>
      </label>

      <label>
        Status
        <select formControlName="status">
          <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
        </select>
      </label>
    </div>

    <label class="full-width">
      Notes
      <textarea formControlName="notes" rows="5" placeholder="Optional notes for the appointment"></textarea>
    </label>

    <button type="submit" class="btn-submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Scheduling...' : 'Schedule Appointment' }}
    </button>
  </form>
</div>
