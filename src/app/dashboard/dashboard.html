<div class="dashboard-container">
  <div class="dashboard-header">
    <div>
      <h1>Welcome to Our Real Estate management 👋</h1>
      <p>Here is what's happening with your real estate business today.</p>
    </div>
    <div class="header-actions">
      <button class="btn-secondary">Download Report</button>
      <button class="btn-primary">+ Add Property</button>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card" *ngFor="let stat of stats">
      <div class="stat-icon-wrapper">
        <svg *ngIf="stat.icon === 'home'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <svg *ngIf="stat.icon === 'check-circle'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <svg *ngIf="stat.icon === 'dollar-sign'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        <svg *ngIf="stat.icon === 'list'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
      </div>
      <div class="stat-content">
        <h3>{{ stat.value }}</h3>
        <p>{{ stat.title }}</p>
      </div>
      <div class="stat-trend" [class.positive]="stat.isPositive" [class.negative]="!stat.isPositive">
        <svg *ngIf="stat.isPositive" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
        <svg *ngIf="!stat.isPositive" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
        <span>{{ stat.trend }}</span>
      </div>
    </div>
  </div>

  <div class="dashboard-main">
    <!-- Chart Section (Simulated) -->
    <div class="chart-section glass-panel">
      <div class="section-header">
        <h2>Revenue Overview</h2>
        <select class="time-filter">
          <option>This Year</option>
          <option>Last Year</option>
          <option>All Time</option>
        </select>
      </div>
      <div class="mock-chart">
        <!-- CSS-based simulated bar chart -->
        <div class="bar" style="height: 40%"><span>Jan</span></div>
        <div class="bar" style="height: 60%"><span>Feb</span></div>
        <div class="bar" style="height: 55%"><span>Mar</span></div>
        <div class="bar" style="height: 80%"><span>Apr</span></div>
        <div class="bar" style="height: 70%"><span>May</span></div>
        <div class="bar" style="height: 95%; background: linear-gradient(to top, #3b82f6, #60a5fa);"><span>Jun</span></div>
        <div class="bar" style="height: 45%"><span>Jul</span></div>
        <div class="bar" style="height: 65%"><span>Aug</span></div>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="activity-section glass-panel">
      <div class="section-header">
        <h2>Recent Activity</h2>
      </div>
      <div class="activity-list">
        <div class="activity-item" *ngFor="let activity of recentActivities">
          <div class="activity-icon" [class]="activity.color">
             <svg *ngIf="activity.icon === 'plus'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
             <svg *ngIf="activity.icon === 'check'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg>
             <svg *ngIf="activity.icon === 'edit'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
             <svg *ngIf="activity.icon === 'message'" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          </div>
          <div class="activity-details">
            <h4>{{ activity.action }}</h4>
            <p>{{ activity.property }}</p>
          </div>
          <div class="activity-time">{{ activity.time }}</div>
        </div>
      </div>
      <button class="btn-outline full-width">View All Activity</button>
    </div>
  </div>
</div>
